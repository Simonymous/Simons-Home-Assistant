- id: '1783697731849'
  alias: 'Schlafzimmer: Hitzeschutz Rollos'
  description: Steuert beide Schlafzimmer-Rollläden basierend auf Temperatur und Eve-Fenstersensor
  triggers:
  - trigger: numeric_state
    entity_id:
    - weather.forecast_home
    attribute: temperature
    above: 24
  conditions: []
  actions:
  - choose:
    - conditions:
      - condition: numeric_state
        entity_id: weather.forecast_home
        attribute: temperature
        above: 24
      - condition: sun
        after: sunrise
        before: sunset
      sequence:
      - choose:
        - conditions:
          - condition: state
            entity_id: binary_sensor.eve_door_20ebn9901_tur
            state: 'off'
          sequence:
          - action: cover.set_cover_position
            target:
              entity_id:
              - cover.schlafzimmer_links
              - cover.schlafzimmer_rechts
            data:
              position: 0
        - conditions:
          - condition: state
            entity_id: binary_sensor.eve_door_20ebn9901_tur
            state: 'on'
          sequence:
          - action: notify.notify
            data:
              title: Hitzeschutz active!
              message: Die Rollläden im Schlafzimmer sollten automatisch schließen,
                aber das Fenster ist noch offen!
  mode: restart
- id: '1783698163537'
  alias: 'Schutz: Schlafzimmer Rollladen rechts blockieren wenn Fenster offen'
  description: Verhindert JEDE Schließung des rechten Rollladens (manuell, Siri, HomeKit),
    wenn das Fenster offen ist.
  triggers:
  - trigger: state
    entity_id: cover.schlafzimmer_rechts
  conditions:
  - condition: state
    entity_id: binary_sensor.eve_door_20ebn9901_tur
    state: 'on'
  - condition: template
    value_template: '{{ state_attr(''cover.schlafzimmer_rechts'', ''current_position'')
      | int < 100 }}'
  actions:
  - action: cover.open_cover
    target:
      entity_id: cover.schlafzimmer_rechts
  - action: notify.notify
    data:
      title: Rollladen-Sperre ausgelöst!
      message: Der rechte Rollladen wurde automatisch geöffnet, da das Fenster noch
        offen steht.
  mode: restart
- id: '1783778455548'
  alias: 'Synology: Download abgeschlossen'
  description: Protokolliert den Zeitpunkt und meldet, wenn der Download auf der Synology
    beendet ist.
  triggers:
  - entity_id: binary_sensor.synology_download_aktiv
    from: 'on'
    to: 'off'
