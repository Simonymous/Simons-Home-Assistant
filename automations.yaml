  description: Startet die 3h-Parkuhr, sobald das Auto an der Ladesäule eingesteckt
    wird.
  triggers:
  - entity_id: binary_sensor.byd_seal_u_dm_i_stecker
    from: 'off'
    to: 'on'
    trigger: state
  conditions:
  - condition: zone
    entity_id: device_tracker.byd_seal_u_dm_i_standort
    zone: zone.ladesaule_parkplatz
  actions:
  - action: timer.start
    target:
      entity_id: timer.ladesaeule_parkplatz
  mode: single
- id: '1783786435301'
  alias: 'Ladesäule Parkplatz: Timer abbrechen'
  description: Bricht die Parkuhr ab, sobald das Auto ausgesteckt wird oder den Parkplatz
