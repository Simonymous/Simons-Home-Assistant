- id: '1783786435289'
  alias: 'Waschmaschine: Live-Timer starten'
  description: Startet beim Einschalten eine persistente Live Activity auf Simons
    iPhone. Zeigt zunächst nur, dass das Gerät läuft, solange die Restzeit noch nicht
    bekannt ist.
  triggers:
  - entity_id: binary_sensor.waschmaschine_lauft
    from: 'off'
    to: 'on'
    trigger: state
  conditions: []
  actions:
  - action: notify.notify
    data:
      title: Waschmaschine
      message: Läuft – Restzeit noch nicht bekannt
      data:
        tag: waschmaschine_timer
        live_update: true
        notification_icon: mdi:washing-machine
        notification_icon_color: '#2196F3'
  mode: single
- id: '1783786435290'
  alias: 'Waschmaschine: Live-Timer aktualisieren'
  description: Sobald ein Programm erkannt wurde, wird die Live Activity um Programmname,
    Restzeit-Countdown und die voraussichtliche Fertig-Uhrzeit ergänzt.
  triggers:
  - entity_id: sensor.waschmaschine_programm
    trigger: state
  conditions:
  - condition: state
    entity_id: binary_sensor.waschmaschine_lauft
    state: 'on'
  - condition: template
    value_template: '{{ trigger.to_state.state not in [''detecting...'', ''off'',
      ''none'', ''unknown'', ''''] }}'
  - condition: template
    value_template: '{{ states(''sensor.waschmaschine_verbleibende_zeit'') not in
      [''unknown'', ''unavailable'', ''''] }}'
  actions:
  - action: notify.notify
    data:
      title: Waschmaschine
      message: '{% set mins = states(''sensor.waschmaschine_verbleibende_zeit'') |
        float(0) %}{% set finish = (now() + timedelta(minutes=mins)).strftime(''%H:%M'')
        %}{{ trigger.to_state.state }} · noch {{ mins | round | int }} min · fertig
        um {{ finish }}'
      data:
        tag: waschmaschine_timer
        live_update: true
        chronometer: true
        when_relative: true
        when: '{{ (states(''sensor.waschmaschine_verbleibende_zeit'') | float(0) *
          60) | int }}'
        notification_icon: mdi:washing-machine
        notification_icon_color: '#2196F3'
  mode: single
- id: '1783786435291'
  alias: 'Waschmaschine: Live-Timer beenden'
  description: Schließt die Live Activity, sobald waschmaschine ausgeht.
  triggers:
