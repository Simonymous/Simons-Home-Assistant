  triggers:
  - entity_id: binary_sensor.byd_seal_u_dm_i_stecker
    from: 'on'
    to: 'off'
    trigger: state
  - trigger: zone
    entity_id: device_tracker.byd_seal_u_dm_i_standort
    zone: zone.ladesaule_parkplatz
    event: leave
  conditions:
  - condition: state
    entity_id: timer.ladesaeule_parkplatz
    state: active
  actions:
  - action: timer.cancel
    target:
      entity_id: timer.ladesaeule_parkplatz
  mode: single
