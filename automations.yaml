  - action: notify.mobile_app_eierphone_simon
    data:
      title: Parkzeit läuft ab
      message: Noch 10 Minuten, dann läuft die 3h-Parkzeit an der Ladesäule ab.
      data:
        notification_icon: mdi:ev-station
        notification_icon_color: '#FF9800'
  mode: single
- id: '1783786435303'
  alias: 'Wohnwand: Ein mit Apple TV (abends)'
  description: Schaltet die Wohnwand-Steckdose mit ein, wenn der Wohnzimmer-AppleTV
    abends nach Sonnenuntergang aktiviert wird.
  triggers:
  - entity_id: media_player.wohnzimmer_appletv_wohnzimmer_appletv
    from: 'off'
    trigger: state
  conditions:
  - condition: sun
    after: sunset
  actions:
  - action: switch.turn_on
    target:
      entity_id: switch.wohnzimmer_wohnwand_outlet
  mode: single
- id: '1783786435304'
  alias: 'Wohnwand: Aus mit Apple TV (immer)'
  description: Schaltet immer die Wohnwand-Steckdose mit aus, wenn der Wohnzimmer-AppleTV
    ausgeht.
  triggers:
  - entity_id: media_player.wohnzimmer_appletv_wohnzimmer_appletv
    to: 'off'
    trigger: state
  conditions: []
  actions:
  - action: switch.turn_off
    target:
      entity_id: switch.wohnzimmer_wohnwand_outlet
  mode: single
- id: '1783786435305'
  alias: 'Zahnbürste: Neuer Bürstenkopf fällig'
  description: Benachrichtigt Simon, wenn der Sonicare-Bürstenkopf laut Verschleiß-Sensor
    fast verbraucht ist.
  triggers:
  - trigger: numeric_state
    entity_id: sensor.sonicare_simon_brush_head_wear
    above: 90
  conditions: []
  actions:
  - action: notify.mobile_app_eierphone_simon
    data:
      title: Zahnbürste
      message: Der Bürstenkopf ist zu {{ states('sensor.sonicare_simon_brush_head_wear') }}%
        verschlissen - Zeit für einen neuen.
      data:
        notification_icon: mdi:toothbrush-electric
        notification_icon_color: '#FF9800'
  mode: single
