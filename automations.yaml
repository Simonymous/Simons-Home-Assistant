- id: '1783688965632'
  alias: 'Nuki Batterie fast leer Reminder '
  description: ''
  triggers:
  - trigger: time
    at: '18:00:00'
  conditions:
  - condition: battery.is_level
    target:
      entity_id: sensor.smart_lock_pro_batterie
    options:
      threshold:
        type: below
        value:
          active_choice: number
          number: 15
  actions:
  - action: tts.speak
    metadata: {}
    target:
      area_id: ai
    data:
      cache: true
      media_player_entity_id: media_player.homepod_wohnzimmer_homepod_wohnzimmer
      message: Achtung! Die Batterie des Nuki Wohnungs-Schloss ist fast leer!
  - action: notify.notify
    metadata: {}
    data:
      title: Batterie fast leer
      message: Achtung! Die Batterie des Nuki Wohnungs-Schloss ist fast leer!
  mode: single
- id: '1783689109119'
