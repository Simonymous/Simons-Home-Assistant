name: Home Assistant CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  yamllint:
    name: 🧹 YAML Lint
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🔎 Run yamllint
        uses: ibiqlik/action-yamllint@v3
        with:
          # Ignoriert externe HACS-Komponenten, damit fremder Code nicht den CI sprengt
          ignore: custom_components/
          config_data: |
            extends: default
            rules:
              line-length: disable
              document-start: disable
              truthy: disable
              # Schaltet die pedantische Einrückungs-Prüfung ab
              indentation: disable
              # Ignoriert kosmetische Dinge wie Leerzeichen in Kommentaren oder am Zeilenende
              comments: disable
              trailing-spaces: disable
              empty-lines: disable
              new-line-at-end-of-file: disable

  ha-check:
    name: 🏠 HA Config Check
    runs-on: ubuntu-latest
    needs: yamllint
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🔐 Create Fake Secrets
        # Home Assistant crasht beim Check, wenn in der Config '!secret xyz' 
        # steht, aber die secrets.yaml fehlt. Das hier erstellt einen Dummy.
        run: |
          echo "dummy_password: testing" > secrets.yaml
          echo "wifi_password: testing" >> secrets.yaml
          # Füge hier weitere dummy-werte hinzu, falls der Check danach verlangt

      - name: 🛠️ Run Home Assistant Config Check
        # Hier nutzen wir explizit das Beta-Image passend zu deinem Setup!
        uses: docker://ghcr.io/home-assistant/home-assistant:beta
        with:
          args: python -m homeassistant --config . --script check_config
