          {% if app == 'com.netflix.Netflix' %}#E50914
          {% elif app == 'com.google.ios.youtube' %}#FF0000
          {% elif app in ['com.amazon.aiv.AIVApp', 'com.amazon.Lounge'] %}#00A8E1
          {% elif app == 'com.disney.disneyplus' %}#113CCF
          {% elif app == 'com.spotify.client' %}#1DB954
          {% elif app == 'com.plexapp.plex' %}#E5A00D
          {% else %}white
          {% endif %}
    - type: conditional
      conditions:
      - condition: state
        entity: media_player.schlafzimmer_appletv_schlafzimmer_appletv
        state: playing
      - condition: state
        entity: media_player.schlafzimmer_appletv_schlafzimmer_appletv
        attribute: app_id
