      card:
        type: custom:button-card
        entity: media_player.schlafzimmer_appletv_schlafzimmer_appletv
        name: Auf YouTube weiterschauen
        label: Sucht Titel + Kanal auf YouTube
        icon: mdi:youtube
        show_name: true
