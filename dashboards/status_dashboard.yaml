            entity_id:
            - light.esszimmer_hue_go_1
            - light.esszimmer_hue_white_lamp_1
    - type: custom:button-card
      entity: vacuum.bob
      name: Saugroboter Bob
      icon: mdi:robot-vacuum
      show_name: true
      show_state: false
      show_label: true
      show_icon: true
      label: "[[[\n  const st = states['vacuum.bob'];\n  const state = st ? st.state : 'unknown';\n  const labels = {cleaning:'Läuft', docked:'Läuft nicht', idle:'Läuft nicht', paused:'Pausiert', returning:'Kehrt zurück', error:'Fehler', off:'Aus'};\n  const running = labels[state] || (state.charAt(0).toUpperCase() + state.slice(1));\n  const last = states['sensor.bob_letztes_reinigungsende'];\n  let lastTxt = '';\n  if (last && last.state && !['unknown','unavailable',''].includes(last.state)) {\n    const d = new Date(last.state);\n    if (!isNaN(d.getTime())) {\n      const dd = String(d.getDate()).padStart(2,'0');\n      const mm = String(d.getMonth()+1).padStart(2,'0');\n      const hh = String(d.getHours()).padStart(2,'0');\n      const mi = String(d.getMinutes()).padStart(2,'0');\n      lastTxt = 'Letzte Reinigung: ' + dd + '.' + mm + '. um ' + hh + ':' + mi;\n    }\n  }\n  return lastTxt ? (running + ' · ' + lastTxt) : running;\n]]]"
      tap_action:
        action: navigate
        navigation_path: /dashboard-reinigung/roborock
      styles:
        card:
        - padding: 12px
        - min-height: 66px
        grid:
        - grid-template-areas: '"i n" "i l"'
        - grid-template-columns: 42px 1fr
        - grid-template-rows: min-content min-content
        icon:
        - width: 24px
        - height: 24px
        name:
        - justify-self: start
        - font-weight: bold
        - font-size: 14px
        label:
        - justify-self: start
        - font-size: 12px
        - color: var(--secondary-text-color)
        - white-space: normal
      state:
      - value: cleaning
        color: rgb(76, 175, 80)
        styles:
          icon:
          - animation: machine-blink 1.6s ease-in-out infinite
      - operator: default
        color: var(--disabled-text-color)
      extra_styles: '@keyframes machine-blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.45; } }'
  - type: vertical-stack
    cards:
    - type: heading
      heading: Büro
      heading_style: title
      icon: mdi:desktop-classic
    - type: custom:mushroom-template-card
      entity: climate.esszimmer_heizung_esszimmer
      tap_action:
        action: more-info
      primary: >-
        {% set t = states('sensor.esszimmer_heizung_esszimmer_current_temperature') %}
        {% if t in ['unavailable', 'unknown', 'none', ''] %}Nicht erreichbar{% else %}{{ t }} °C{% endif %}
      secondary: >-
        {% set h = states('sensor.esszimmer_heizung_esszimmer_current_humidity') %}
        {% if h in ['unavailable', 'unknown', 'none', ''] %}Sensor offline{% else %}{{ h }} % Luftfeuchtigkeit{% endif %}
      icon: >-
        {% set t = states('sensor.esszimmer_heizung_esszimmer_current_temperature') %}
        {{ 'mdi:thermometer-off' if t in ['unavailable', 'unknown', 'none', ''] else 'mdi:thermometer' }}
      icon_color: >-
        {% set t = states('sensor.esszimmer_heizung_esszimmer_current_temperature') %}
        {% if t in ['unavailable', 'unknown', 'none', ''] %}grey{% else %}
        {% set tf = t | float(0) %}
        {% if tf >= 23 %}orange{% elif tf <= 19 %}blue{% else %}green{% endif %}
        {% endif %}
      layout: horizontal
    - type: custom:mushroom-fan-card
      entity: fan.zhimi_de_533989040_za5_s_2_fan
      name: Ventilator
      icon: mdi:fan
      icon_animation: true
      show_percentage_control: true
      layout: horizontal
      icon_color: cyan
      tap_action:
        action: toggle
    - type: custom:mushroom-chips-card
      alignment: start
      chips:
      - type: template
        icon: mdi:ceiling-light
        content: Decke
        icon_color: >-
          {{ 'amber' if is_state('light.buro_buro', 'on') else 'grey' }}
        tap_action:
          action: perform-action
          perform_action: light.toggle
          target:
            entity_id: light.buro_buro
    - type: custom:button-card
      entity: sensor.hp_envy_6400_series
      name: HP Envy Drucker
      icon: mdi:printer
      show_name: true
      show_state: false
      show_label: true
      show_icon: true
      label: "[[[\n  const st = states['sensor.hp_envy_6400_series'];\n  const status = st ? st.state : 'unknown';\n  const statusLabels = {idle:'Bereit', printing:'Druckt…', unknown:'Unbekannt'};\n  const black = states['sensor.hp_envy_6400_series_black_cartridge'];\n  const color = states['sensor.hp_envy_6400_series_tri_color_cartridge'];\n  const fmt = (s) => (!s || ['unavailable','unknown','none',''].includes(s.state)) ? '?' : (s.state + '%');\n  const parts = [statusLabels[status] || status];\n  parts.push('Schwarz ' + fmt(black));\n  parts.push('Farbe ' + fmt(color));\n  return parts.join(' · ');\n]]]"
      styles:
        card:
        - padding: 12px
        - min-height: 66px
        grid:
        - grid-template-areas: '"i n" "i l"'
        - grid-template-columns: 42px 1fr
        - grid-template-rows: min-content min-content
        icon:
        - width: 24px
        - height: 24px
        name:
        - justify-self: start
        - font-weight: bold
        - font-size: 14px
        label:
        - justify-self: start
        - font-size: 12px
        - color: var(--secondary-text-color)
        - white-space: normal
      state:
      - operator: template
        value: "[[[\n  const black = states['sensor.hp_envy_6400_series_black_cartridge'];\n  const color = states['sensor.hp_envy_6400_series_tri_color_cartridge'];\n  const low = (s) => s && !isNaN(parseFloat(s.state)) && parseFloat(s.state) <= 10;\n  return low(black) || low(color);\n]]]"
        icon: mdi:printer-alert
        color: red
        styles:
          icon:
          - animation: machine-blink 1.6s ease-in-out infinite
      - operator: default
        color: var(--disabled-text-color)
      extra_styles: '@keyframes machine-blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.45; } }'
  - type: vertical-stack
    cards:
    - type: heading
      heading: Küche
      heading_style: title
      icon: mdi:stove
    - type: custom:mushroom-template-card
      entity: climate.kuche_heizung_kuche
      tap_action:
        action: more-info
      primary: >-
