        {% if t1 in ['unavailable', 'unknown', 'none', ''] or t2 in ['unavailable', 'unknown', 'none', ''] %}Nicht erreichbar{% else %}{{ ((t1 | float(0) + t2 | float(0)) / 2) | round(1) }} °C{% endif %}
      secondary: >-
        {% set h1 = states('sensor.schlafzimmer_heizung_schlafzimmer_links_current_humidity') %}
        {% set h2 = states('sensor.schlafzimmer_heizung_schlafzimmer_rechts_current_humidity') %}
        {% if h1 in ['unavailable', 'unknown', 'none', ''] or h2 in ['unavailable', 'unknown', 'none', ''] %}Sensor offline{% else %}{{ ((h1 | float(0) + h2 | float(0)) / 2) | round(0) }} % Luftfeuchtigkeit{% endif %}
      icon: >-
        {% set t1 = states('sensor.schlafzimmer_heizung_schlafzimmer_links_current_temperature') %}
        {% set t2 = states('sensor.schlafzimmer_heizung_schlafzimmer_rechts_current_temperature') %}
        {{ 'mdi:thermometer-off' if (t1 in ['unavailable', 'unknown', 'none', ''] or t2 in ['unavailable', 'unknown', 'none', '']) else 'mdi:thermometer' }}
      icon_color: >-
        {% set t1 = states('sensor.schlafzimmer_heizung_schlafzimmer_links_current_temperature') %}
        {% set t2 = states('sensor.schlafzimmer_heizung_schlafzimmer_rechts_current_temperature') %}
        {% if t1 in ['unavailable', 'unknown', 'none', ''] or t2 in ['unavailable', 'unknown', 'none', ''] %}grey{% else %}
        {% set t = (t1 | float(0) + t2 | float(0)) / 2 %}
        {% if t >= 23 %}orange{% elif t <= 19 %}blue{% else %}green{% endif %}
        {% endif %}
      layout: horizontal
    - type: grid
      columns: 2
      square: false
      cards:
      - type: custom:mushroom-light-card
        entity: light.schlafzimmer_schlafzimmer
        name: Decke
        icon: mdi:ceiling-light
        layout: vertical
        show_brightness_control: true
        use_light_color: true
        tap_action:
          action: toggle
        hold_action:
          action: more-info
      - type: custom:mushroom-light-card
        entity: light.schlafzimmer_smart_led_strip
        name: Bett-LED
        icon: mdi:led-strip-variant
        layout: vertical
        show_brightness_control: true
        use_light_color: true
        tap_action:
          action: toggle
        hold_action:
          action: more-info
    - type: custom:button-card
