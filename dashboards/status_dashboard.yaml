      entity: sensor.restabfall_tage_bis_abholung
      name: Restabfall
      icon: mdi:trash-can
      show_name: true
      show_state: false
      show_label: true
      show_icon: true
      label: "[[[\n  const st = states['sensor.restabfall_tage_bis_abholung'];\n  const days = st ? parseInt(st.state, 10) : 99;\n  if (isNaN(days)) return '';\n  if (days === 0) return 'HEUTE!';\n  if (days === 1) return 'MORGEN!';\n  return 'In ' + days + ' Tagen';\n]]]"
