- title: Auto
  path: auto
  icon: mdi:car-electric
  background: 'linear-gradient(135deg, #0f0c29 0%, #302b63 45%, #24243e 100%) fixed'
  cards:
  - type: custom:vehicle-status-card
    name: BYD Seal U DM-i
    images:
    - image: /local/byd_seal_u_dmi.png
    indicator_rows:
    - row_items:
      - type: entity
        entity: binary_sensor.byd_seal_u_dm_i_online
        name: Verbindung
        show_name: true
        show_state: true
        show_icon: true
      - type: entity
        entity: lock.byd_seal_u_dm_i_abschliessen
        name: Verriegelung
        show_name: true
        show_state: true
        show_icon: true
        tap_action:
          action: more-info
      - type: entity
        entity: binary_sensor.byd_seal_u_dm_i_turen_offen
        name: Türen/Fenster
        show_name: true
        show_state: true
        show_icon: true
      - type: entity
        entity: sensor.byd_seal_u_dm_i_reichweite
        name: Reichweite
        icon: mdi:map-marker-distance
        show_name: true
        show_state: true
        show_icon: true
      alignment: center
    range_info:
    - energy_level:
        entity: sensor.byd_seal_u_dm_i_ladezustand
        icon: mdi:battery
        value_position: inside
        tap_action:
          action: more-info
      charging_entity: binary_sensor.byd_seal_u_dm_i_laden
      progress_color: '#4caf50'
      bar_height: 16
      bar_radius: 8
    - energy_level:
        entity: sensor.byd_seal_u_dm_i_kraftstofffullstand
        icon: mdi:gas-station
        value_position: inside
      progress_color: '#ff9800'
      bar_height: 16
      bar_radius: 8
    button_cards:
    - name: Klimaanlage
      entity: climate.byd_seal_u_dm_i_klima
      icon: mdi:air-conditioner
      button_type: action
      tap_action:
        action: more-info
    - name: Innenraum
      entity: sensor.byd_seal_u_dm_i_innenraumtemperatur
      icon: mdi:thermometer
      button_type: action
      tap_action:
        action: more-info
    - name: Außen
      entity: sensor.byd_seal_u_dm_i_aussentemperatur
      icon: mdi:thermometer
      button_type: action
      tap_action:
        action: more-info
    - name: Kilometerstand
      entity: sensor.byd_seal_u_dm_i_kilometerzahler
      icon: mdi:counter
      button_type: action
      tap_action:
        action: more-info
    mini_map:
      device_tracker: device_tracker.byd_seal_u_dm_i_standort
      map_zoom: 14
    layout_config:
      button_grid:
        rows: 2
        columns: 2
      range_info_config:
        layout: row
      section_order:
      - images
      - range_info
      - indicators
      - buttons
      - mini_map
