    - type: tile
      entity: sensor.simon_synology_volume_1_durchschnittliche_festplattentemperatur
      name: Festplatten-Temperatur
      icon: mdi:thermometer
      color: red
  - type: heading
    heading: Netzwerk
    heading_style: title
    icon: mdi:swap-vertical
  - type: grid
    columns: 2
    square: false
    cards:
    - type: tile
      entity: sensor.simon_synology_download_durchsatz
      name: Download-Durchsatz
      icon: mdi:arrow-down-bold
      color: blue
    - type: tile
      entity: sensor.simon_synology_upload_durchsatz
