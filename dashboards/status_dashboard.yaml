          icon:
          - width: 24px
          - height: 24px
          name:
          - justify-self: start
          - font-weight: bold
          - font-size: 14px
          label:
          - justify-self: start
          - font-size: 12px
          - color: var(--secondary-text-color)
          - white-space: normal
        state:
        - operator: template
          value: '[[[ return states[''sensor.rollo_links_bewegung''] && states[''sensor.rollo_links_bewegung''].state === ''oeffnet''; ]]]'
          icon: mdi:window-shutter-open
          color: blue
          styles:
            icon:
            - animation: machine-blink 1.2s ease-in-out infinite
        - operator: template
          value: '[[[ return states[''sensor.rollo_links_bewegung''] && states[''sensor.rollo_links_bewegung''].state === ''schliesst''; ]]]'
          icon: mdi:window-shutter
          color: blue
          styles:
            icon:
            - animation: machine-blink 1.2s ease-in-out infinite
        - value: open
          icon: mdi:window-shutter-open
          color: blue
        - value: closed
          icon: mdi:window-shutter
          color: var(--disabled-text-color)
        - operator: default
          icon: mdi:window-shutter-alert
          color: grey
        extra_styles: '@keyframes machine-blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.45; } }'
      - type: custom:button-card
        entity: cover.schlafzimmer_rechts
        name: Rollo rechts
        show_name: true
        show_state: false
        show_label: true
        show_icon: true
        label: "[[[\n  const st = states['cover.schlafzimmer_rechts'];\n  const state = st ? st.state : 'unknown';\n  const bewegung = states['sensor.rollo_rechts_bewegung'] ? states['sensor.rollo_rechts_bewegung'].state : 'ruht';\n  if (bewegung === 'oeffnet') return 'Öffnet…';\n  if (bewegung === 'schliesst') return 'Schließt…';\n  const labels = {open:'Offen', closed:'Geschlossen'};\n  return labels[state] || 'Unbekannt';\n]]]"
        tap_action:
          action: toggle
        styles:
          card:
          - padding: 12px
          - min-height: 66px
          grid:
          - grid-template-areas: '"i n" "i l"'
          - grid-template-columns: 42px 1fr
          - grid-template-rows: min-content min-content
          icon:
          - width: 24px
          - height: 24px
          name:
          - justify-self: start
          - font-weight: bold
          - font-size: 14px
          label:
          - justify-self: start
          - font-size: 12px
          - color: var(--secondary-text-color)
          - white-space: normal
        state:
        - operator: template
          value: '[[[ return states[''sensor.rollo_rechts_bewegung''] && states[''sensor.rollo_rechts_bewegung''].state === ''oeffnet''; ]]]'
          icon: mdi:window-shutter-open
          color: blue
          styles:
            icon:
            - animation: machine-blink 1.2s ease-in-out infinite
        - operator: template
          value: '[[[ return states[''sensor.rollo_rechts_bewegung''] && states[''sensor.rollo_rechts_bewegung''].state === ''schliesst''; ]]]'
          icon: mdi:window-shutter
          color: blue
          styles:
            icon:
            - animation: machine-blink 1.2s ease-in-out infinite
        - value: open
          icon: mdi:window-shutter-open
          color: blue
        - value: closed
          icon: mdi:window-shutter
          color: var(--disabled-text-color)
        - operator: default
          icon: mdi:window-shutter-alert
          color: grey
        extra_styles: '@keyframes machine-blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.45; } }'
    - type: conditional
      conditions:
      - condition: state
        entity: media_player.schlafzimmer_appletv_schlafzimmer_appletv
        state: playing
      card:
        type: custom:mushroom-media-player-card
        entity: media_player.schlafzimmer_appletv_schlafzimmer_appletv
