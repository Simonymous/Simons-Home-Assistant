      square: false
      cards:
      - type: custom:button-card
        entity: cover.schlafzimmer_links
        name: Rollo links
        show_name: true
        show_state: false
        show_label: true
        show_icon: true
        label: "[[[\n  const st = states['cover.schlafzimmer_links'];\n  const state = st ? st.state : 'unknown';\n  const bewegung = states['sensor.rollo_links_bewegung'] ? states['sensor.rollo_links_bewegung'].state : 'ruht';\n  if (bewegung === 'oeffnet') return 'Öffnet…';\n  if (bewegung === 'schliesst') return 'Schließt…';\n  const labels = {open:'Offen', closed:'Geschlossen'};\n  return labels[state] || 'Unbekannt';\n]]]"
        tap_action:
          action: toggle
        styles:
