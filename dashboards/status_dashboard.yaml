title: Mein Zuhause
theme: Liquid Glass
views:
- title: Zuhause
  path: zuhause
  icon: mdi:home
  background: 'linear-gradient(135deg, #0f0c29 0%, #302b63 45%, #24243e 100%) fixed'
  cards:
  - type: custom:stack-in-card
    cards:
    - type: heading
      heading: Anwesenheit
      heading_style: title
      icon: mdi:account-multiple
      card_mod: &heading_card_mod
        style: |
          ha-card {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 2px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.12);
            margin-bottom: 4px;
          }
          ha-card ha-state-icon, ha-card ha-icon {
            color: var(--primary-color);
            --mdc-icon-size: 22px;
          }
    - type: grid
      columns: 2
      square: false
      cards:
      - type: custom:mushroom-person-card
        entity: person.simonymous
        name: Simon
        layout: vertical
        use_entity_picture: true
      - type: custom:mushroom-person-card
        entity: person.madeleine
        name: Madeleine
        layout: vertical
        use_entity_picture: true
  - type: custom:stack-in-card
    cards:
    - type: heading
      heading: Wohnzimmer
      heading_style: title
      icon: mdi:sofa
      tap_action:
        action: navigate
        navigation_path: /config/areas/area/wohnzimmer
      card_mod: *heading_card_mod
    - type: custom:mushroom-template-card
      entity: climate.wohnzimmer_heizung_wohnzimmer
      tap_action:
        action: more-info
      primary: >-
        {% set t = states('sensor.wohnzimmer_heizung_wohnzimmer_current_temperature') %}
        {% if t in ['unavailable', 'unknown', 'none', ''] %}Nicht erreichbar{% else %}{{ t }} °C{% endif %}
      secondary: >-
        {% set h = states('sensor.wohnzimmer_heizung_wohnzimmer_current_humidity') %}
        {% if h in ['unavailable', 'unknown', 'none', ''] %}Sensor offline{% else %}{{ h }} % Luftfeuchtigkeit{% endif %}
      icon: >-
        {% set t = states('sensor.wohnzimmer_heizung_wohnzimmer_current_temperature') %}
        {{ 'mdi:thermometer-off' if t in ['unavailable', 'unknown', 'none', ''] else 'mdi:thermometer' }}
      icon_color: >-
        {% set t = states('sensor.wohnzimmer_heizung_wohnzimmer_current_temperature') %}
        {% if t in ['unavailable', 'unknown', 'none', ''] %}grey{% else %}
        {% set tf = t | float(0) %}
        {% if tf >= 23 %}orange{% elif tf <= 19 %}blue{% else %}green{% endif %}
        {% endif %}
      layout: horizontal
    - type: grid
      columns: 2
      square: false
      cards:
      - type: custom:mushroom-light-card
        entity: light.wohnzimmer_wohnzimmer
        name: Decke
        icon: mdi:ceiling-light
        layout: vertical
        show_brightness_control: true
        use_light_color: true
        tap_action:
          action: toggle
        hold_action:
          action: more-info
      - type: custom:mushroom-template-card
        entity: switch.wohnzimmer_wohnwand_outlet
        primary: Wohnwand
        secondary: "{{ 'An' if is_state('switch.wohnzimmer_wohnwand_outlet', 'on') else 'Aus' }}"
        icon: mdi:sofa-outline
        icon_color: "{{ 'amber' if is_state('switch.wohnzimmer_wohnwand_outlet', 'on') else 'grey' }}"
        layout: vertical
        tap_action:
          action: perform-action
          perform_action: switch.toggle
          target:
            entity_id: switch.wohnzimmer_wohnwand_outlet
        hold_action:
          action: more-info
    - type: conditional
      conditions:
      - condition: state
        entity: media_player.wohnzimmer_appletv_wohnzimmer_appletv
        state: playing
      card:
        type: custom:mushroom-media-player-card
        entity: media_player.wohnzimmer_appletv_wohnzimmer_appletv
        use_media_info: true
        show_volume_level: false
        icon: >-
          {% set app = state_attr('media_player.wohnzimmer_appletv_wohnzimmer_appletv', 'app_id') %}
          {% if app == 'com.netflix.Netflix' %}mdi:netflix
          {% elif app == 'com.google.ios.youtube' %}mdi:youtube
          {% elif app in ['com.amazon.aiv.AIVApp', 'com.amazon.Lounge'] %}mdi:amazon
          {% elif app == 'com.disney.disneyplus' %}mdi:disney-plus
          {% elif app == 'com.spotify.client' %}mdi:spotify
          {% elif app == 'com.plexapp.plex' %}mdi:plex
          {% elif app == 'com.apple.TVWatchList' %}mdi:apple
          {% else %}mdi:apple-tv
          {% endif %}
        icon_color: >-
          {% set app = state_attr('media_player.wohnzimmer_appletv_wohnzimmer_appletv', 'app_id') %}
          {% if app == 'com.netflix.Netflix' %}#E50914
          {% elif app == 'com.google.ios.youtube' %}#FF0000
          {% elif app in ['com.amazon.aiv.AIVApp', 'com.amazon.Lounge'] %}#00A8E1
          {% elif app == 'com.disney.disneyplus' %}#113CCF
          {% elif app == 'com.spotify.client' %}#1DB954
          {% elif app == 'com.plexapp.plex' %}#E5A00D
          {% else %}white
          {% endif %}
    - type: conditional
      conditions:
      - condition: state
        entity: media_player.wohnzimmer_appletv_wohnzimmer_appletv
        state: playing
      - condition: state
        entity: media_player.wohnzimmer_appletv_wohnzimmer_appletv
        attribute: app_id
        state: com.google.ios.youtube
      card:
        type: custom:button-card
        entity: media_player.wohnzimmer_appletv_wohnzimmer_appletv
        name: Auf YouTube weiterschauen
        label: Sucht Titel + Kanal auf YouTube
        icon: mdi:youtube
        show_name: true
        show_state: false
        show_label: true
        show_icon: true
        color: rgb(255, 0, 0)
        styles:
          card:
          - padding: 12px
          - min-height: 66px
          grid:
          - grid-template-areas: '"i n" "i l"'
          - grid-template-columns: 42px 1fr
          - grid-template-rows: min-content min-content
          icon:
          - width: 24px
          - height: 24px
          name:
          - justify-self: start
          - font-weight: bold
          - font-size: 14px
          - white-space: normal
          label:
          - justify-self: start
          - font-size: 12px
          - color: var(--secondary-text-color)
          - white-space: normal
        tap_action:
          action: url
          url_path: >
            [[[ return 'https://www.youtube.com/results?search_query=' +
            encodeURIComponent((entity.attributes.media_title || '') + ' ' + (entity.attributes.media_artist || '')) ]]]
    - type: conditional
      conditions:
      - condition: state
        entity: media_player.lg_webos_tv_65nano759pa
        state: playing
      card:
        type: custom:mushroom-media-player-card
        entity: media_player.lg_webos_tv_65nano759pa
        use_media_info: true
        show_volume_level: false
    - type: conditional
      conditions:
      - condition: state
        entity: media_player.homepod_wohnzimmer_homepod_wohnzimmer
        state: playing
      card:
        type: custom:mushroom-media-player-card
        entity: media_player.homepod_wohnzimmer_homepod_wohnzimmer
        use_media_info: true
        show_volume_level: false
  - type: custom:stack-in-card
    cards:
    - type: heading
      heading: Schlafzimmer
      heading_style: title
      icon: mdi:bed
      tap_action:
        action: navigate
        navigation_path: /config/areas/area/schlafzimmer
      card_mod: *heading_card_mod
    - type: custom:mushroom-template-card
