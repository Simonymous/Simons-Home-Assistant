- title: Synology
  path: synology
  icon: mdi:nas
  cards:
  - type: heading
    heading: Downloads
    heading_style: title
    icon: mdi:download-network
  - type: grid
    columns: 2
    square: false
    cards:
    - type: custom:button-card
      entity: binary_sensor.synology_download_aktiv
      name: Download
      icon: mdi:download-network
      show_name: true
      show_state: false
      show_label: true
      show_icon: true
      label: "[[[\n  const st = states['binary_sensor.synology_download_aktiv'];\n  return (st && st.state === 'on') ? 'Download läuft…' : 'Kein Download aktiv';\n]]]"
      styles:
        card:
        - padding: 12px
        - min-height: 66px
        grid:
        - grid-template-areas: '"i n" "i l"'
        - grid-template-columns: 42px 1fr
        - grid-template-rows: min-content min-content
        icon:
        - width: 24px
        - height: 24px
        name:
        - justify-self: start
        - font-weight: bold
        - font-size: 14px
        label:
        - justify-self: start
        - font-size: 12px
        - color: var(--secondary-text-color)
      state:
      - value: 'on'
        icon: mdi:loading
        color: rgb(33, 150, 243)
        styles:
          icon:
          - animation: spinner-spin 1.1s linear infinite, machine-blink 1.6s ease-in-out infinite
      - operator: default
        color: var(--disabled-text-color)
      extra_styles: '@keyframes spinner-spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } } @keyframes machine-blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.45; } }'
    - type: custom:mushroom-template-card
      primary: Letzter Download
      secondary: '{% set dt = states(''input_datetime.letzter_synology_download'') %}{% if dt in [''unknown'', ''unavailable'', ''none'', ''''] %} Noch keiner erfasst {% else %} {{ as_timestamp(dt) | timestamp_custom(''%d.%m.%Y um %H:%M Uhr'') }} {% endif %}'
      icon: mdi:clock-check-outline
      icon_color: grey
      layout: vertical
  - type: heading
    heading: System
    heading_style: title
    icon: mdi:chip
  - type: grid
