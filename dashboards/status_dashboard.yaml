    primary: '{% set count = states(''sensor.tracking_numbers_simon_triem_icloud_com_simon_triem_icloud_com_tracking_numbers'') | int(0) %}{% if count == 0 %} Keine Sendungen unterwegs {% elif count == 1 %} 1 Sendung unterwegs {% else %} {{ count }} Sendungen unterwegs {% endif %}'
    secondary: '{% set by_carrier = state_attr(''sensor.tracking_numbers_simon_triem_icloud_com_simon_triem_icloud_com_tracking_numbers'', ''summary'').by_carrier if state_attr(''sensor.tracking_numbers_simon_triem_icloud_com_simon_triem_icloud_com_tracking_numbers'', ''summary'') else {} %}{% if by_carrier %} {% for carrier, n in by_carrier.items() %}{{ carrier }}: {{ n }}{% if not loop.last %} · {% endif %}{% endfor %} {% else %} Alles zugestellt {% endif %}'
    icon: mdi:truck-delivery
    icon_color: '{% if states(''sensor.tracking_numbers_simon_triem_icloud_com_simon_triem_icloud_com_tracking_numbers'') | int(0) > 0 %} purple {% else %} grey {% endif %}'
    layout: horizontal
  - type: markdown
    content: '{% set pkgs = state_attr(''sensor.tracking_numbers_simon_triem_icloud_com_simon_triem_icloud_com_tracking_numbers'', ''packages'') or [] %}{% if pkgs %}

      {% for p in pkgs %}- **{{ p.retailer | default(''Unbekannter Shop'') }}** via {{ p.carrier | default(''?'') }} — {{ p.status | default(p.delivery_status) | default(''unterwegs'') }}

      {% endfor %}{% else %}_Aktuell ist nichts unterwegs._{% endif %}'
- title: Maschinen
  path: maschinen
  icon: mdi:washing-machine
  cards:
  - type: custom:button-card
    entity: sensor.spulmaschine_zustand
    name: Spülmaschine
    icon: mdi:dishwasher
    show_name: true
    show_state: false
    show_label: true
    show_icon: true
    label: "[[[\n  const zustand = states['sensor.spulmaschine_zustand'];\n  const state = zustand ? zustand.state : 'unknown';\n  const labels = {off:'Aus', idle:'Bereit', finished:'Fertig!', paused:'Pausiert', user_paused:'Pausiert', starting:'Startet…', ending:'Endet…', delay_wait:'Startverzögerung', interrupted:'Unterbrochen', force_stopped:'Gestoppt', clean:'Fertig – bitte ausräumen'};\n  if (state !== 'running') {\n    return labels[state] || (state.charAt(0).toUpperCase() + state.slice(1));\n  }\n  const program = states['sensor.spulmaschine_programm'] ? states['sensor.spulmaschine_programm'].state : 'off';\n  const minsRaw = states['sensor.spulmaschine_verbleibende_zeit'] ? states['sensor.spulmaschine_verbleibende_zeit'].state : 'unknown';\n  const mins = parseFloat(minsRaw);\n  const parts = [];\n  if (program && !['off','unknown','unavailable','none',''].includes(program)) parts.push(program);\n  if (!isNaN(mins) && mins >= 0) {\n    const finish = new Date(Date.now() + mins*60000);\n\
      \    const hh = String(finish.getHours()).padStart(2,'0');\n    const mm = String(finish.getMinutes()).padStart(2,'0');\n    const h = Math.floor(mins/60);\n    const m = Math.round(mins%60);\n    const dur = h > 0 ? (h + ':' + String(m).padStart(2,'0') + ' h') : (m + ' min');\n    parts.push('fertig ' + hh + ':' + mm);\n    parts.push(dur + ' verbleibend');\n  } else {\n    parts.push('Programm wird erkannt…');\n  }\n  return parts.join(' · ');\n]]]"
    styles:
      card:
      - padding: 12px
      - min-height: 66px
      grid:
      - grid-template-areas: '"i n" "i l"'
      - grid-template-columns: 42px 1fr
      - grid-template-rows: min-content min-content
      icon:
      - width: 24px
      - height: 24px
      name:
      - justify-self: start
      - font-weight: bold
      - font-size: 14px
      label:
      - justify-self: start
      - font-size: 12px
      - color: var(--secondary-text-color)
      - white-space: normal
    state:
    - value: running
      color: rgb(33, 150, 243)
      styles:
        icon:
        - animation: machine-blink 1.6s ease-in-out infinite, machine-wobble 1.2s ease-in-out infinite
    - value: finished
      color: rgb(76, 175, 80)
    - operator: default
      color: var(--disabled-text-color)
    extra_styles: '@keyframes machine-blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.45; } } @keyframes machine-wobble { 0%, 100% { transform: rotate(-8deg); } 50% { transform: rotate(8deg); } }'
  - type: custom:button-card
    entity: sensor.waschmaschine_zustand
    name: Waschmaschine
    icon: mdi:washing-machine
    show_name: true
    show_state: false
    show_label: true
    show_icon: true
    label: "[[[\n  const zustand = states['sensor.waschmaschine_zustand'];\n  const state = zustand ? zustand.state : 'unknown';\n  const labels = {off:'Aus', idle:'Bereit', finished:'Fertig!', paused:'Pausiert', user_paused:'Pausiert', starting:'Startet…', ending:'Endet…', delay_wait:'Startverzögerung', interrupted:'Unterbrochen', force_stopped:'Gestoppt', clean:'Fertig – bitte ausräumen'};\n  if (state !== 'running') {\n    return labels[state] || (state.charAt(0).toUpperCase() + state.slice(1));\n  }\n  const program = states['sensor.waschmaschine_programm'] ? states['sensor.waschmaschine_programm'].state : 'off';\n  const minsRaw = states['sensor.waschmaschine_verbleibende_zeit'] ? states['sensor.waschmaschine_verbleibende_zeit'].state : 'unknown';\n  const mins = parseFloat(minsRaw);\n  const parts = [];\n  if (program && !['off','unknown','unavailable','none',''].includes(program)) parts.push(program);\n  if (!isNaN(mins) && mins >= 0) {\n    const finish = new Date(Date.now() + mins*60000);\n\
      \    const hh = String(finish.getHours()).padStart(2,'0');\n    const mm = String(finish.getMinutes()).padStart(2,'0');\n    const h = Math.floor(mins/60);\n    const m = Math.round(mins%60);\n    const dur = h > 0 ? (h + ':' + String(m).padStart(2,'0') + ' h') : (m + ' min');\n    parts.push('fertig ' + hh + ':' + mm);\n    parts.push(dur + ' verbleibend');\n  } else {\n    parts.push('Programm wird erkannt…');\n  }\n  return parts.join(' · ');\n]]]"
    styles:
      card:
      - padding: 12px
      - min-height: 66px
      grid:
      - grid-template-areas: '"i n" "i l"'
      - grid-template-columns: 42px 1fr
      - grid-template-rows: min-content min-content
      icon:
      - width: 24px
      - height: 24px
      name:
      - justify-self: start
      - font-weight: bold
      - font-size: 14px
      label:
      - justify-self: start
      - font-size: 12px
      - color: var(--secondary-text-color)
      - white-space: normal
    state:
    - value: running
      color: rgb(0, 150, 136)
      styles:
        icon:
        - animation: machine-blink 1.6s ease-in-out infinite, machine-spin 2.2s linear infinite
    - value: finished
      color: rgb(76, 175, 80)
    - operator: default
      color: var(--disabled-text-color)
    extra_styles: '@keyframes machine-blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.45; } } @keyframes machine-spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }'
  - type: custom:button-card
    entity: sensor.trockner_zustand
    name: Trockner
    icon: mdi:tumble-dryer
    show_name: true
    show_state: false
    show_label: true
    show_icon: true
    label: "[[[\n  const zustand = states['sensor.trockner_zustand'];\n  const state = zustand ? zustand.state : 'unknown';\n  const labels = {off:'Aus', idle:'Bereit', finished:'Fertig!', paused:'Pausiert', user_paused:'Pausiert', starting:'Startet…', ending:'Endet…', delay_wait:'Startverzögerung', interrupted:'Unterbrochen', force_stopped:'Gestoppt', clean:'Fertig – bitte ausräumen'};\n  if (state !== 'running') {\n    return labels[state] || (state.charAt(0).toUpperCase() + state.slice(1));\n  }\n  const program = states['sensor.trockner_programm'] ? states['sensor.trockner_programm'].state : 'off';\n  const minsRaw = states['sensor.trockner_verbleibende_zeit'] ? states['sensor.trockner_verbleibende_zeit'].state : 'unknown';\n  const mins = parseFloat(minsRaw);\n  const parts = [];\n  if (program && !['off','unknown','unavailable','none',''].includes(program)) parts.push(program);\n  if (!isNaN(mins) && mins >= 0) {\n    const finish = new Date(Date.now() + mins*60000);\n    const hh\
      \ = String(finish.getHours()).padStart(2,'0');\n    const mm = String(finish.getMinutes()).padStart(2,'0');\n    const h = Math.floor(mins/60);\n    const m = Math.round(mins%60);\n    const dur = h > 0 ? (h + ':' + String(m).padStart(2,'0') + ' h') : (m + ' min');\n    parts.push('fertig ' + hh + ':' + mm);\n    parts.push(dur + ' verbleibend');\n  } else {\n    parts.push('Programm wird erkannt…');\n  }\n  return parts.join(' · ');\n]]]"
    styles:
      card:
      - padding: 12px
      - min-height: 66px
      grid:
      - grid-template-areas: '"i n" "i l"'
      - grid-template-columns: 42px 1fr
      - grid-template-rows: min-content min-content
      icon:
      - width: 24px
      - height: 24px
      name:
      - justify-self: start
      - font-weight: bold
      - font-size: 14px
      label:
      - justify-self: start
      - font-size: 12px
      - color: var(--secondary-text-color)
      - white-space: normal
    state:
    - value: running
      color: rgb(255, 152, 0)
      styles:
        icon:
        - animation: machine-blink 1.6s ease-in-out infinite, machine-spin 2.2s linear infinite
    - value: finished
