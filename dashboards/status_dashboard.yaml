    - type: conditional
      conditions:
      - condition: state
        entity: media_player.homepod_schlafzimmer_homepod_schlafzimmer
        state: playing
      card:
        type: custom:mushroom-media-player-card
        entity: media_player.homepod_schlafzimmer_homepod_schlafzimmer
        use_media_info: true
        show_volume_level: false
  - type: custom:stack-in-card
    cards:
    - type: heading
      heading: Esszimmer
      heading_style: title
      icon: mdi:silverware-fork-knife
      tap_action:
        action: navigate
        navigation_path: /config/areas/area/esszimmer
      card_mod: *heading_card_mod
    - type: custom:mushroom-template-card
      entity: climate.esszimmer_heizung_esszimmer_2
      tap_action:
        action: more-info
      primary: >-
        {% set t = states('sensor.esszimmer_heizung_esszimmer_current_temperature_2') %}
