    - type: custom:button-card
      entity: vacuum.bob
      name: Saugroboter Bob
      icon: mdi:robot-vacuum
      show_name: true
      show_state: false
      show_label: true
      show_icon: true
      label: "[[[\n  const st = states['vacuum.bob'];\n  const state = st ? st.state : 'unknown';\n  const labels = {cleaning:'Läuft', docked:'Läuft nicht', idle:'Läuft nicht', paused:'Pausiert', returning:'Kehrt zurück', error:'Fehler', off:'Aus'};\n  const running = labels[state] || (state.charAt(0).toUpperCase() + state.slice(1));\n  const last = states['sensor.bob_letztes_reinigungsende'];\n  let lastTxt = '';\n  if (last && last.state && !['unknown','unavailable',''].includes(last.state)) {\n    const d = new Date(last.state);\n    if (!isNaN(d.getTime())) {\n      const dd = String(d.getDate()).padStart(2,'0');\n      const mm = String(d.getMonth()+1).padStart(2,'0');\n      const hh = String(d.getHours()).padStart(2,'0');\n      const mi = String(d.getMinutes()).padStart(2,'0');\n      lastTxt = 'Letzte Reinigung: ' + dd + '.' + mm + '. um ' + hh + ':' + mi;\n    }\n  }\n  return lastTxt ? (running + ' · ' + lastTxt) : running;\n]]]"
      tap_action:
        action: navigate
        navigation_path: /dashboard-reinigung/roborock
      styles:
        card:
        - padding: 12px
        - min-height: 66px
