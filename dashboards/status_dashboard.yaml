title: Mein Zuhause
theme: Liquid Glass
views:
- title: Zuhause
  path: zuhause
  icon: mdi:home
  background: 'linear-gradient(135deg, #0f0c29 0%, #302b63 45%, #24243e 100%) fixed'
  cards:
  - type: vertical-stack
    cards:
    - type: heading
      heading: Anwesenheit
      heading_style: title
      icon: mdi:account-multiple
    - type: grid
      columns: 2
      square: false
      cards:
      - type: custom:mushroom-person-card
        entity: person.simonymous
        name: Simon
        layout: vertical
        use_entity_picture: true
      - type: custom:mushroom-person-card
        entity: person.madeleine
        name: Madeleine
        layout: vertical
        use_entity_picture: true
  - type: vertical-stack
    cards:
    - type: heading
      heading: Wohnzimmer
      heading_style: title
      icon: mdi:sofa
    - type: custom:mushroom-template-card
      entity: climate.wohnzimmer_heizung_wohnzimmer
      tap_action:
        action: more-info
      primary: >-
        {% set t = states('sensor.wohnzimmer_heizung_wohnzimmer_current_temperature') %}
        {% if t in ['unavailable', 'unknown', 'none', ''] %}Nicht erreichbar{% else %}{{ t }} °C{% endif %}
      secondary: >-
        {% set h = states('sensor.wohnzimmer_heizung_wohnzimmer_current_humidity') %}
        {% if h in ['unavailable', 'unknown', 'none', ''] %}Sensor offline{% else %}{{ h }} % Luftfeuchtigkeit{% endif %}
      icon: >-
        {% set t = states('sensor.wohnzimmer_heizung_wohnzimmer_current_temperature') %}
        {{ 'mdi:thermometer-off' if t in ['unavailable', 'unknown', 'none', ''] else 'mdi:thermometer' }}
      icon_color: >-
        {% set t = states('sensor.wohnzimmer_heizung_wohnzimmer_current_temperature') %}
        {% if t in ['unavailable', 'unknown', 'none', ''] %}grey{% else %}
        {% set tf = t | float(0) %}
        {% if tf >= 23 %}orange{% elif tf <= 19 %}blue{% else %}green{% endif %}
        {% endif %}
      layout: horizontal
    - type: custom:mushroom-chips-card
      alignment: start
      chips:
      - type: template
        icon: mdi:ceiling-light
        content: Decke
        icon_color: >-
          {{ 'amber' if is_state('light.wohnzimmer_hue_centris_ceiling_1', 'on') else 'grey' }}
        tap_action:
          action: perform-action
          perform_action: light.toggle
          target:
            entity_id: light.wohnzimmer_hue_centris_ceiling_1
      - type: template
        icon: mdi:sofa-outline
        content: Wohnwand
        icon_color: >-
          {{ 'amber' if is_state('switch.wohnzimmer_wohnwand_outlet', 'on') else 'grey' }}
        tap_action:
          action: perform-action
          perform_action: switch.toggle
          target:
            entity_id: switch.wohnzimmer_wohnwand_outlet
    - type: conditional
      conditions:
      - condition: state
        entity: media_player.wohnzimmer_appletv_wohnzimmer_appletv
        state: playing
      card:
        type: custom:mushroom-media-player-card
        entity: media_player.wohnzimmer_appletv_wohnzimmer_appletv
        use_media_info: true
        show_volume_level: false
    - type: conditional
      conditions:
      - condition: state
        entity: media_player.lg_webos_tv_65nano759pa
        state: playing
      card:
        type: custom:mushroom-media-player-card
        entity: media_player.lg_webos_tv_65nano759pa
        use_media_info: true
        show_volume_level: false
    - type: conditional
      conditions:
      - condition: state
        entity: media_player.homepod_wohnzimmer_homepod_wohnzimmer
        state: playing
      card:
        type: custom:mushroom-media-player-card
        entity: media_player.homepod_wohnzimmer_homepod_wohnzimmer
        use_media_info: true
        show_volume_level: false
  - type: vertical-stack
    cards:
    - type: heading
      heading: Schlafzimmer
      heading_style: title
      icon: mdi:bed
    - type: custom:mushroom-template-card
