          - padding: 12px
          - min-height: 66px
          grid:
          - grid-template-areas: '"i n" "i l"'
          - grid-template-columns: 42px 1fr
          - grid-template-rows: min-content min-content
          icon:
          - width: 24px
          - height: 24px
          name:
          - justify-self: start
          - font-weight: bold
          - font-size: 14px
          label:
          - justify-self: start
          - font-size: 12px
          - color: var(--secondary-text-color)
          - white-space: normal
        state:
        - value: open
          icon: mdi:window-shutter-open
          color: blue
        - value: closed
