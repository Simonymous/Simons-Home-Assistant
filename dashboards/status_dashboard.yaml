          {% if app == 'com.netflix.Netflix' %}mdi:netflix
          {% elif app == 'com.google.ios.youtube' %}mdi:youtube
          {% elif app in ['com.amazon.aiv.AIVApp', 'com.amazon.Lounge'] %}mdi:amazon
          {% elif app == 'com.disney.disneyplus' %}mdi:disney-plus
          {% elif app == 'com.spotify.client' %}mdi:spotify
          {% elif app == 'com.plexapp.plex' %}mdi:plex
          {% elif app == 'com.apple.TVWatchList' %}mdi:apple
          {% else %}mdi:apple-tv
          {% endif %}
        icon_color: >-
