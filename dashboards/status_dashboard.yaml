        - min-height: 66px
        grid:
        - grid-template-areas: '"i n" "i l"'
        - grid-template-columns: 42px 1fr
        - grid-template-rows: min-content min-content
        icon:
        - width: 24px
        - height: 24px
        name:
        - justify-self: start
        - font-weight: bold
        - font-size: 14px
        label:
        - justify-self: start
        - font-size: 12px
        - color: var(--secondary-text-color)
        - white-space: normal
      state:
      - operator: template
        value: >-
          [[[ return states['cover.schlafzimmer_links'].state === 'closed' ||
          states['cover.schlafzimmer_rechts'].state === 'closed'; ]]]
        label: Öffnen
        icon: mdi:arrow-expand-vertical
        color: blue
        tap_action:
          action: perform-action
          perform_action: cover.open_cover
          target:
            entity_id:
            - cover.schlafzimmer_links
            - cover.schlafzimmer_rechts
      - operator: default
        label: Schließen
        icon: mdi:arrow-collapse-vertical
        color: blue
        tap_action:
          action: perform-action
          perform_action: cover.close_cover
          target:
            entity_id:
            - cover.schlafzimmer_links
            - cover.schlafzimmer_rechts
    - type: grid
