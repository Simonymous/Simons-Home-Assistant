        {% set t = (t1 | float(0) + t2 | float(0)) / 2 %}
        {% if t >= 23 %}orange{% elif t <= 19 %}blue{% else %}green{% endif %}
        {% endif %}
      layout: horizontal
    - type: grid
      columns: 2
      square: false
      cards:
      - type: custom:button-card
        entity: cover.schlafzimmer_links
