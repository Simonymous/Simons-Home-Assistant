        {% if t in ['unavailable', 'unknown', 'none', ''] %}grey{% else %}
        {% set tf = t | float(0) %}
        {% if tf >= 23 %}orange{% elif tf <= 19 %}blue{% else %}green{% endif %}
        {% endif %}
      layout: horizontal
    - type: custom:button-card
      entity: sensor.spulmaschine_zustand
      name: Spülmaschine
      icon: mdi:dishwasher
      show_name: true
      show_state: false
      show_label: true
      show_icon: true
      label: "[[[\n  const zustand = states['sensor.spulmaschine_zustand'];\n  const state = zustand ? zustand.state : 'unknown';\n  const labels = {off:'Aus', idle:'Bereit', finished:'Fertig!', paused:'Pausiert', user_paused:'Pausiert', starting:'Startet…', ending:'Endet…', delay_wait:'Startverzögerung', interrupted:'Unterbrochen', force_stopped:'Gestoppt', clean:'Fertig – bitte ausräumen'};\n  if (state !== 'running') {\n    const base = labels[state] || (state.charAt(0).toUpperCase() + state.slice(1));\n    if (state === 'off') {\n      const last = states['input_datetime.letzter_lauf_spulmaschine'];\n      if (last && last.state) {\n        const m = last.state.match(/^(\\d{4})-(\\d{2})-(\\d{2}) (\\d{2}):(\\d{2})/);\n        if (m) return base + ' · Zuletzt gelaufen: ' + m[3] + '.' + m[2] + '. um ' + m[4] + ':' + m[5];\n      }\n    }\n    return base;\n  }\n  const program = states['sensor.spulmaschine_programm'] ? states['sensor.spulmaschine_programm'].state : 'off';\n  const minsRaw = states['sensor.spulmaschine_verbleibende_zeit'] ? states['sensor.spulmaschine_verbleibende_zeit'].state : 'unknown';\n  const mins = parseFloat(minsRaw);\n  const parts = [];\n  if (program && !['off','unknown','unavailable','none',''].includes(program)) parts.push(program);\n  if (!isNaN(mins) && mins >= 0) {\n    const finish = new Date(Date.now() + mins*60000);\n    const hh = String(finish.getHours()).padStart(2,'0');\n    const mm = String(finish.getMinutes()).padStart(2,'0');\n    const h = Math.floor(mins/60);\n    const m = Math.round(mins%60);\n    const dur = h > 0 ? (h + ':' + String(m).padStart(2,'0') + ' h') : (m + ' min');\n    parts.push('fertig ' + hh + ':' + mm);\n    parts.push(dur + ' verbleibend');\n  } else {\n    parts.push('Programm wird erkannt…');\n  }\n  return parts.join(' · ');\n]]]"
      styles:
        card:
        - padding: 12px
        - min-height: 66px
        grid:
        - grid-template-areas: '"i n" "i l"'
        - grid-template-columns: 42px 1fr
        - grid-template-rows: min-content min-content
        icon:
        - width: 24px
        - height: 24px
        name:
        - justify-self: start
        - font-weight: bold
        - font-size: 14px
        label:
        - justify-self: start
        - font-size: 12px
        - color: var(--secondary-text-color)
