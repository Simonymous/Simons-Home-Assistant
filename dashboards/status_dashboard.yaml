    - type: custom:mushroom-chips-card
      alignment: start
      chips:
      - type: template
        icon: mdi:ceiling-light
        content: Decke
        icon_color: >-
          {{ 'amber' if is_state('light.esszimmer_esszimmer_decke', 'on') else 'grey' }}
        tap_action:
          action: perform-action
