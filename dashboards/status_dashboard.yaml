          icon: mdi:window-shutter-alert
          color: grey
        extra_styles: '@keyframes machine-blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.45; } }'
      - type: custom:button-card
        entity: cover.schlafzimmer_rechts
        name: Rollo rechts
        show_name: true
        show_state: false
        show_label: true
        show_icon: true
        label: "[[[\n  const st = states['cover.schlafzimmer_rechts'];\n  const state = st ? st.state : 'unknown';\n  const labels = {open:'Offen', closed:'Geschlossen', opening:'Öffnet…', closing:'Schließt…'};\n  return labels[state] || 'Unbekannt';\n]]]"
        tap_action:
          action: toggle
        styles:
          card:
          - padding: 12px
          - min-height: 66px
          grid:
          - grid-template-areas: '"i n" "i l"'
          - grid-template-columns: 42px 1fr
          - grid-template-rows: min-content min-content
          icon:
          - width: 24px
          - height: 24px
          name:
          - justify-self: start
          - font-weight: bold
          - font-size: 14px
          label:
          - justify-self: start
          - font-size: 12px
          - color: var(--secondary-text-color)
          - white-space: normal
        state:
        - value: open
          icon: mdi:window-shutter-open
          color: blue
        - value: closed
          icon: mdi:window-shutter
          color: var(--disabled-text-color)
        - value: opening
          icon: mdi:window-shutter-open
          color: blue
          styles:
            icon:
            - animation: machine-blink 1.2s ease-in-out infinite
        - value: closing
          icon: mdi:window-shutter
          color: blue
          styles:
            icon:
            - animation: machine-blink 1.2s ease-in-out infinite
        - operator: default
          icon: mdi:window-shutter-alert
          color: grey
        extra_styles: '@keyframes machine-blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.45; } }'
    - type: custom:mushroom-chips-card
      alignment: start
      chips:
      - type: template
        icon: mdi:ceiling-light
        content: Decke
        icon_color: >-
          {{ 'amber' if is_state('light.schlafzimmer_schlafzimmer', 'on') else 'grey' }}
        tap_action:
          action: perform-action
          perform_action: light.toggle
          target:
            entity_id: light.schlafzimmer_schlafzimmer
      - type: template
        icon: mdi:led-strip-variant
        content: Bett-LED
        icon_color: >-
          {{ 'amber' if is_state('light.schlafzimmer_smart_led_strip', 'on') else 'grey' }}
        tap_action:
          action: perform-action
          perform_action: light.toggle
          target:
            entity_id: light.schlafzimmer_smart_led_strip
    - type: conditional
      conditions:
      - condition: state
        entity: media_player.schlafzimmer_appletv_schlafzimmer_appletv
        state: playing
      card:
        type: custom:mushroom-media-player-card
        entity: media_player.schlafzimmer_appletv_schlafzimmer_appletv
        use_media_info: true
        show_volume_level: false
    - type: conditional
      conditions:
      - condition: state
        entity: media_player.homepod_schlafzimmer_homepod_schlafzimmer
        state: playing
      card:
        type: custom:mushroom-media-player-card
        entity: media_player.homepod_schlafzimmer_homepod_schlafzimmer
        use_media_info: true
        show_volume_level: false
  - type: vertical-stack
    cards:
    - type: heading
