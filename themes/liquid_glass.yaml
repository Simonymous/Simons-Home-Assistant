Liquid Glass:
  card-mod-theme: "Liquid Glass"
  card-mod-card: |
    ha-card {
      border-radius: 28px !important;
      border: 1px solid var(--lg-border-color) !important;
      background:
        linear-gradient(135deg, rgba(255, 255, 255, 0.14) 0%, rgba(255, 255, 255, 0) 50%),
        var(--lg-card-background) !important;
      backdrop-filter: blur(30px) saturate(180%) !important;
      -webkit-backdrop-filter: blur(30px) saturate(180%) !important;
      box-shadow: var(--lg-card-shadow) !important;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

  primary-color: "#0A84FF"
  accent-color: "#0A84FF"
  ha-card-border-radius: "28px"
  ha-card-border-width: "0px"
  ha-card-background: "var(--lg-card-background)"

  mush-rgb-white: "255, 255, 255"

  modes:
    light:
      lg-card-background: "rgba(255, 255, 255, 0.55)"
      lg-border-color: "rgba(255, 255, 255, 0.65)"
      lg-card-shadow: "0 8px 32px rgba(31, 38, 135, 0.15), inset 0 1px 1px rgba(255, 255, 255, 0.5)"
      primary-background-color: "#dCe8ff"
      secondary-background-color: "rgba(255, 255, 255, 0.35)"
      card-background-color: "rgba(255, 255, 255, 0.001)"
      primary-text-color: "#1c1c1e"
      secondary-text-color: "#48484a"
      disabled-text-color: "#8e8e93"
    dark:
      lg-card-background: "rgba(72, 64, 110, 0.45)"
      lg-border-color: "rgba(255, 255, 255, 0.22)"
      lg-card-shadow: "0 8px 32px rgba(0, 0, 0, 0.5), inset 0 1px 1px rgba(255, 255, 255, 0.1)"
      primary-background-color: "#0f0c29"
      secondary-background-color: "rgba(255, 255, 255, 0.08)"
      card-background-color: "rgba(0, 0, 0, 0.001)"
      primary-text-color: "#f2f2f7"
      secondary-text-color: "#d4d0e0"
      disabled-text-color: "#8b87a0"
