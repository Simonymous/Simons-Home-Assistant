
# Loads default set of integrations. Do not remove.
default_config:

# Load frontend themes from the themes folder
frontend:
  themes: !include_dir_merge_named themes

automation: !include automations.yaml
script: !include scripts.yaml
scene: !include scenes.yaml
timer:
  ladesaeule_parkplatz:
    name: Ladesäule Parkplatz
    duration: "02:50:00"
paket_tracking:
media_player:
  - platform: universal
    name: "Lautsprecher Wohnzimmer"
    unique_id: lautsprecher_wohnzimmer_media_player
    device_class: receiver
    attributes:
      state: binary_sensor.receiver_an
      is_volume_muted: input_boolean.lautsprecher_stumm_angenommen
    commands:
      turn_on:
        action: script.lautsprecher_einschalten
      turn_off:
        action: script.lautsprecher_ausschalten
      volume_up:
        action: script.lautsprecher_lauter
      volume_down:
        action: script.lautsprecher_leiser
      volume_mute:
        action: script.lautsprecher_stumm_setzen
        data:
          is_volume_muted: "{{ is_volume_muted }}"
logger:
  logs:
    custom_components.paket_tracking: debug
    custom_components.philips_sonicare_ble: debug
lovelace:
  dashboards:
    dashboard-reinigung:
      mode: yaml
      filename: dashboards/status_dashboard.yaml
      title: Status Dashboard
      icon: mdi:clipboard-check-outline
      show_in_sidebar: true
      require_admin: false
homeassistant:
  media_dirs:
    local: /media
input_datetime:
  letzter_synology_download:
    name: Letzter Synology Download
    has_date: true
    has_time: true
  letzter_lauf_spulmaschine:
    name: Letzter Lauf Spülmaschine
    has_date: true
    has_time: true
  letzter_lauf_waschmaschine:
    name: Letzter Lauf Waschmaschine
    has_date: true
    has_time: true
  letzter_lauf_trockner:
    name: Letzter Lauf Trockner
    has_date: true
    has_time: true
  letzte_bewegung_flur:
    name: Letzte Bewegung Flur
    has_date: true
    has_time: true
  letztes_aufschliessen_wohnung:
    name: Letztes Aufschließen Wohnungsschloss
    has_date: true
    has_time: true

template:
  - sensor:
      - name: "Nuki Keypad Batterie"
        unit_of_measurement: "%"
        device_class: battery
        state: >
          {{ state_attr('lock.smart_lock_pro', 'keypad_battery_critical') }}:

      # Liest das naechste Abholdatum direkt aus den Attributen der
      # waste_collection_schedule UI-Sensoren (deren "state" ist nur ein
      # Anzeigetext wie "on Mi, 15.07.2026", kein Tage-Zaehler) und rechnet
      # daraus die Tage bis zur Abholung aus.
      - name: "Restabfall Tage bis Abholung"
        unique_id: restabfall_tage_bis_abholung
        unit_of_measurement: "d"
        state: >-
          {% set meta_keys = ['icon', 'friendly_name', 'attribution', 'device_class', 'unit_of_measurement', 'state_class'] %}
          {% set st = states['sensor.waste_collection_schedule_restabfalltonne'] %}
          {% set dates = (st.attributes.keys() | reject('in', meta_keys) | list | sort) if st else [] %}
          {{ (strptime(dates[0], '%Y-%m-%d').date() - now().date()).days if dates else 99 }}

      - name: "Biotonne Tage bis Abholung"
        unique_id: biotonne_tage_bis_abholung
        unit_of_measurement: "d"
        state: >-
          {% set meta_keys = ['icon', 'friendly_name', 'attribution', 'device_class', 'unit_of_measurement', 'state_class'] %}
          {% set st = states['sensor.waste_collection_schedule_biotonne'] %}
          {% set dates = (st.attributes.keys() | reject('in', meta_keys) | list | sort) if st else [] %}
          {{ (strptime(dates[0], '%Y-%m-%d').date() - now().date()).days if dates else 99 }}

      - name: "Gelbe Tonne Tage bis Abholung"
        unique_id: gelbe_tonne_tage_bis_abholung
        unit_of_measurement: "d"
        state: >-
          {% set meta_keys = ['icon', 'friendly_name', 'attribution', 'device_class', 'unit_of_measurement', 'state_class'] %}
          {% set st = states['sensor.waste_collection_schedule_gelbe_tonne'] %}
          {% set dates = (st.attributes.keys() | reject('in', meta_keys) | list | sort) if st else [] %}
          {{ (strptime(dates[0], '%Y-%m-%d').date() - now().date()).days if dates else 99 }}

      - name: "Blaue Tonne Tage bis Abholung"
        unique_id: blaue_tonne_tage_bis_abholung
        unit_of_measurement: "d"
        state: >-
          {% set meta_keys = ['icon', 'friendly_name', 'attribution', 'device_class', 'unit_of_measurement', 'state_class'] %}
          {% set st = states['sensor.waste_collection_schedule_blaue_tonne'] %}
          {% set dates = (st.attributes.keys() | reject('in', meta_keys) | list | sort) if st else [] %}
          {{ (strptime(dates[0], '%Y-%m-%d').date() - now().date()).days if dates else 99 }}
  - lock:
      - name: "Haustuer Intercom"
        state: "locked" # Zeigt in Apple Home standardmäßig "Zugeschlossen" an
        lock:
          service: button.press
          target:
            entity_id: button.vordereingang_tur_offnen
        unlock:
          service: button.press
          target:
            entity_id: button.vordereingang_tur_offnen
  - binary_sensor:
      - name: "Gelbe Tonne rausstellen"
        unique_id: gelbe_tonne_rausstellen
        state: "{{ states('sensor.gelbe_tonne_tage_bis_abholung') | int(99) <= 1 }}"
        device_class: problem

      - name: "Blaue Tonne rausstellen"
        unique_id: blaue_tonne_rausstellen
        state: "{{ states('sensor.blaue_tonne_tage_bis_abholung') | int(99) <= 1 }}"
        device_class: problem

      - name: "Schwarze Tonne rausstellen"
        unique_id: schwarze_tonne_rausstellen
        state: "{{ states('sensor.restabfall_tage_bis_abholung') | int(99) <= 1 }}"
        device_class: problem

      - name: "Synology Download aktiv"
        unique_id: synology_download_aktiv
        icon: mdi:download-network
        device_class: running
        delay_off:
          minutes: 2
        state: "{{ states('sensor.simon_synology_download_durchsatz') | float(0) > 50 }}"

      - name: "Receiver an"
        unique_id: receiver_an
        icon: mdi:audio-video
        device_class: running
        state: "{{ states('sensor.tz3210_2putqrmw_ts011f_leistung') | float(0) > 5 }}"

  - trigger:
      - trigger: state
        entity_id: cover.schlafzimmer_links
        attribute: current_position
        id: change
      - trigger: state
        entity_id: cover.schlafzimmer_links
        attribute: current_position
        for:
          seconds: 3
        id: settled
    sensor:
      - name: "Rollo Links Bewegung"
        unique_id: rollo_links_bewegung
        state: >-
          {% if trigger.id == 'settled' %}ruht
          {% else %}
            {% set von = trigger.from_state.attributes.current_position if trigger.from_state else none %}
            {% set bis = trigger.to_state.attributes.current_position %}
            {% if von is none or bis == von %}ruht
            {% elif bis > von %}oeffnet
            {% else %}schliesst
            {% endif %}
          {% endif %}

  - trigger:
      - trigger: state
        entity_id: cover.schlafzimmer_rechts
        attribute: current_position
        id: change
      - trigger: state
        entity_id: cover.schlafzimmer_rechts
        attribute: current_position
        for:
          seconds: 3
        id: settled
    sensor:
      - name: "Rollo Rechts Bewegung"
        unique_id: rollo_rechts_bewegung
        state: >-
          {% if trigger.id == 'settled' %}ruht
          {% else %}
            {% set von = trigger.from_state.attributes.current_position if trigger.from_state else none %}
            {% set bis = trigger.to_state.attributes.current_position %}
            {% if von is none or bis == von %}ruht
            {% elif bis > von %}oeffnet
            {% else %}schliesst
            {% endif %}
          {% endif %}
          
http:
  use_x_forwarded_for: true
  trusted_proxies:
    - 172.30.33.0/24
  ip_ban_enabled: true
  login_attempts_threshold: 5