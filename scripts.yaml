lautsprecher_einschalten:
  alias: 'Lautsprecher: Einschalten'
  sequence:
  - condition: state
    entity_id: binary_sensor.receiver_an
    state: 'off'
  - action: remote.send_command
    target:
      entity_id: remote.fernbedienung_wohnzimmer
    data:
      device: lautsprecher
      command: an
  - delay:
      seconds: 3
  - action: remote.send_command
    target:
      entity_id: remote.fernbedienung_wohnzimmer
    data:
      device: lautsprecher
      command: tv_eingang
  mode: single

lautsprecher_ausschalten:
  alias: 'Lautsprecher: Ausschalten'
  sequence:
  - condition: state
    entity_id: binary_sensor.receiver_an
    state: 'on'
  - action: remote.send_command
    target:
      entity_id: remote.fernbedienung_wohnzimmer
    data:
      device: lautsprecher
      command: an
  mode: single

lautsprecher_stumm_umschalten:
  alias: 'Lautsprecher: Stumm umschalten'
  sequence:
  - action: remote.send_command
    target:
      entity_id: remote.fernbedienung_wohnzimmer
    data:
      device: lautsprecher
      command: stumm
  mode: single

lautsprecher_stumm_aus:
  alias: 'Lautsprecher: Garantiert nicht stumm'
  sequence:
  - action: remote.send_command
    target:
      entity_id: remote.fernbedienung_wohnzimmer
    data:
      device: lautsprecher
      command: leiser
  - action: remote.send_command
    target:
      entity_id: remote.fernbedienung_wohnzimmer
    data:
      device: lautsprecher
      command: lauter
  - action: input_boolean.turn_off
    target:
      entity_id: input_boolean.lautsprecher_stumm_angenommen
  mode: single

lautsprecher_lauter:
  alias: 'Lautsprecher: Lauter'
  sequence:
  - action: remote.send_command
    target:
      entity_id: remote.fernbedienung_wohnzimmer
    data:
      device: lautsprecher
      command: lauter
  - action: input_boolean.turn_off
    target:
      entity_id: input_boolean.lautsprecher_stumm_angenommen
  mode: single

lautsprecher_leiser:
  alias: 'Lautsprecher: Leiser'
  sequence:
  - action: remote.send_command
    target:
      entity_id: remote.fernbedienung_wohnzimmer
    data:
      device: lautsprecher
      command: leiser
  - action: input_boolean.turn_off
    target:
      entity_id: input_boolean.lautsprecher_stumm_angenommen
  mode: single

lautsprecher_stumm_setzen:
  alias: 'Lautsprecher: Stumm setzen'
  fields:
    is_volume_muted:
      description: Zielzustand fuer Stumm (true = stummschalten, false = entstummen)
      example: true
  sequence:
  - choose:
    - conditions:
      - condition: template
        value_template: "{{ is_volume_muted | bool }}"
      sequence:
      - action: remote.send_command
        target:
          entity_id: remote.fernbedienung_wohnzimmer
        data:
          device: lautsprecher
          command: stumm
      - action: input_boolean.turn_on
        target:
          entity_id: input_boolean.lautsprecher_stumm_angenommen
    default:
    - action: script.lautsprecher_stumm_aus
  mode: single

