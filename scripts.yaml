lautsprecher_einschalten:
  alias: 'Lautsprecher: Einschalten'
  sequence:
  - condition: state
    entity_id: binary_sensor.receiver_an
    state: 'off'
  - action: remote.send_command
    target:
      entity_id: remote.fernbedienung_wohnzimmer
    data:
      device: lautsprecher
      command: an
  - delay:
      seconds: 3
  - action: remote.send_command
    target:
      entity_id: remote.fernbedienung_wohnzimmer
    data:
      device: lautsprecher
      command: tv_eingang
  mode: single

lautsprecher_ausschalten:
  alias: 'Lautsprecher: Ausschalten'
  sequence:
  - condition: state
    entity_id: binary_sensor.receiver_an
    state: 'on'
  - action: remote.send_command
    target:
      entity_id: remote.fernbedienung_wohnzimmer
    data:
      device: lautsprecher
      command: an
  mode: single

lautsprecher_stumm_umschalten:
  alias: 'Lautsprecher: Stumm umschalten'
  sequence:
  - action: remote.send_command
    target:
      entity_id: remote.fernbedienung_wohnzimmer
    data:
      device: lautsprecher
      command: stumm
  mode: single

lautsprecher_stumm_aus:
  alias: 'Lautsprecher: Garantiert nicht stumm'
  sequence:
  - action: remote.send_command
    target:
      entity_id: remote.fernbedienung_wohnzimmer
    data:
      device: lautsprecher
      command: leiser
  - action: remote.send_command
    target:
      entity_id: remote.fernbedienung_wohnzimmer
    data:
      device: lautsprecher
      command: lauter
  mode: single

